<!-- Maskable icon: safe-zone is the inner 80% circle, logo stays within that -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- White background to match the favicon -->
  <rect width="512" height="512" fill="#ffffff"/>
  <!-- Orange M centred within the safe zone (inner 80% = 102–410px) -->
  <text
    x="256"
    y="330"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="240"
    font-weight="900"
    fill="#fb6a2c"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-4"
  >M</text>
</svg>
