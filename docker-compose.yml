version: '3.9'

services:
  db:
    image: mysql:8.1
    container_name: mawby_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - mawby-net

  backend:
    build:
      context: ./Back-End
      dockerfile: Dockerfile
    container_name: mawby_backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      BASE_URL: ${BASE_URL}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      DATABASE_URL: ${DATABASE_URL}
      UPLOAD_ROOT: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - '3001'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - mawby-net

  frontend:
    build:
      context: ./Front-End
      dockerfile: Dockerfile
    container_name: mawby_frontend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 9002
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - '9002'
    healthcheck:
      test: ['CMD', 'node', '-e', "const http = require('http'); const req = http.get('http://127.0.0.1:9002', res => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - mawby-net

  nginx:
    image: nginx:stable-alpine
    container_name: mawby_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - mawby-net

volumes:
  db_data:
  backend_uploads:
  nginx_logs:

networks:
  mawby-net:
    driver: bridge
